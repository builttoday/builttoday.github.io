function wrapText(ctx, text, maxWidth) {
  const paragraphs = text.split("\n");
  const lines = [];
  paragraphs.forEach(p => {
    const words = p.split(" ");
    let line = "";
    words.forEach(w => {
      const test = line ? line + " " + w : w;
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line);
        line = w;
      } else {
        line = test;
      }
    });
    lines.push(line);
  });
  return lines;
}

function drawPost(canvas, post) {
  const ctx = canvas.getContext("2d");
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;

  // background
  const grad = ctx.createRadialGradient(W * 0.75, H * 0.15, 0, W * 0.75, H * 0.15, W * 0.9);
  grad.addColorStop(0, "#1B2130");
  grad.addColorStop(1, "#0E1116");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // accent glow shape top-right
  ctx.beginPath();
  ctx.arc(W * 0.88, H * 0.1, 260, 0, Math.PI * 2);
  ctx.fillStyle = post.accent + "22";
  ctx.fill();

  // eyebrow
  ctx.fillStyle = post.accent;
  ctx.font = "700 30px 'Sora'";
  ctx.textBaseline = "alphabetic";
  ctx.fillText(post.eyebrow, 80, 170);

  // headline
  ctx.fillStyle = "#F3F1EC";
  ctx.font = "800 92px 'Sora'";
  const lines = post.headline.split("\n");
  let y = 320;
  lines.forEach(line => { ctx.fillText(line, 80, y); y += 100; });

  // accent underline
  ctx.fillStyle = post.accent;
  ctx.fillRect(80, y + 10, 120, 8);

  // sub text (wrapped)
  ctx.fillStyle = "#9AA3B2";
  ctx.font = "500 36px 'IBM Plex Sans'";
  const subLines = wrapText(ctx, post.sub, W - 160);
  let sy = y + 80;
  subLines.forEach(line => { ctx.fillText(line, 80, sy); sy += 48; });

  // wordmark bottom
  ctx.font = "800 40px 'Sora'";
  ctx.fillStyle = "#F3F1EC";
  ctx.fillText("Built", 80, H - 80);
  const w1 = ctx.measureText("Built").width;
  ctx.fillStyle = post.accent;
  ctx.fillText("Today", 80 + w1, H - 80);
}

function buildPostBlock(post) {
  const block = document.createElement("div");
  block.className = "post-block";
  const canvas = document.createElement("canvas");
  block.appendChild(canvas);

  const dlBtn = document.createElement("button");
  dlBtn.className = "dl-btn";
  dlBtn.textContent = "Download PNG";
  dlBtn.onclick = () => {
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "built-today-" + post.id + ".png";
    a.click();
  };
  block.appendChild(dlBtn);

  const captionBox = document.createElement("div");
  captionBox.className = "caption-box";
  const label = document.createElement("div");
  label.className = "label"; label.textContent = "Caption";
  captionBox.appendChild(label);
  const ta = document.createElement("textarea");
  ta.value = post.caption; ta.readOnly = true;
  captionBox.appendChild(ta);
  const copyBtn = document.createElement("button");
  copyBtn.className = "copy-btn"; copyBtn.textContent = "Copy caption";
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(post.caption).then(() => {
      copyBtn.textContent = "Copied!";
      setTimeout(() => { copyBtn.textContent = "Copy caption"; }, 1500);
    });
  };
  captionBox.appendChild(copyBtn);
  block.appendChild(captionBox);

  return { block, canvas };
}

/* ============================== PROFILE PICTURE ============================== */
const PFP_VARIANTS = [
  { id: "solid", label: "Stacked wordmark" },
  { id: "ring", label: "Stacked wordmark with ring" },
];

// Same two-tone treatment as the site's own nav logo: "Built" in white,
// "Today" in the accent orange -- not a "BT" monogram, which reads too much
// like an existing telecom logo at a glance.
function drawProfilePic(canvas, variant) {
  const ctx = canvas.getContext("2d");
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;

  const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.75);
  grad.addColorStop(0, "#1B2130");
  grad.addColorStop(1, "#0E1116");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  if (variant === "solid") {
    ctx.font = "800 190px 'Sora'";
    ctx.fillStyle = "#F3F1EC";
    ctx.fillText("Built", W / 2, H / 2 - 110);
    ctx.fillStyle = "#FF7A33";
    ctx.fillText("Today", W / 2, H / 2 + 110);
  } else if (variant === "ring") {
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, 480, 0, Math.PI * 2);
    ctx.strokeStyle = "#FF7A33";
    ctx.lineWidth = 14;
    ctx.stroke();
    ctx.font = "800 165px 'Sora'";
    ctx.fillStyle = "#F3F1EC";
    ctx.fillText("Built", W / 2, H / 2 - 95);
    ctx.fillStyle = "#FF7A33";
    ctx.fillText("Today", W / 2, H / 2 + 95);
  }
}

function buildPfpBlock(variant) {
  const block = document.createElement("div");
  block.className = "pfp-block";

  const row = document.createElement("div");
  row.className = "pfp-preview-row";

  const squareWrap = document.createElement("div");
  squareWrap.className = "pfp-square";
  const squareCanvas = document.createElement("canvas");
  squareWrap.appendChild(squareCanvas);

  const roundWrap = document.createElement("div");
  roundWrap.className = "pfp-round";
  const roundCanvas = document.createElement("canvas");
  roundWrap.appendChild(roundCanvas);

  row.appendChild(squareWrap);
  row.appendChild(roundWrap);
  block.appendChild(row);

  const label = document.createElement("div");
  label.className = "pfp-label";
  label.textContent = variant.label + " (square file + circle preview)";
  block.appendChild(label);

  const dlBtn = document.createElement("button");
  dlBtn.className = "dl-btn";
  dlBtn.textContent = "Download PNG";
  dlBtn.onclick = () => {
    const a = document.createElement("a");
    a.href = squareCanvas.toDataURL("image/png");
    a.download = "built-today-profile-" + variant.id + ".png";
    a.click();
  };
  block.appendChild(dlBtn);

  return { block, squareCanvas, roundCanvas };
}

async function init() {
  if (document.fonts && document.fonts.ready) {
    try {
      await document.fonts.load("800 92px 'Sora'");
      await document.fonts.load("700 30px 'Sora'");
      await document.fonts.load("500 36px 'IBM Plex Sans'");
      await document.fonts.load("800 190px 'Sora'");
      await document.fonts.load("800 165px 'Sora'");
      await document.fonts.ready;
    } catch (e) { /* fonts unavailable -- canvas will fall back to default sans-serif */ }
  }

  const pfpGrid = document.getElementById("pfpGrid");
  PFP_VARIANTS.forEach(variant => {
    const { block, squareCanvas, roundCanvas } = buildPfpBlock(variant);
    pfpGrid.appendChild(block);
    drawProfilePic(squareCanvas, variant.id);
    drawProfilePic(roundCanvas, variant.id);
  });

  const grid = document.getElementById("postGrid");
  POSTS.forEach(post => {
    const { block, canvas } = buildPostBlock(post);
    grid.appendChild(block);
    drawPost(canvas, post);
  });
}
